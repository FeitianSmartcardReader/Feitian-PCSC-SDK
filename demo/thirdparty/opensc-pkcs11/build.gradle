// Demo thirdparty/opensc-pkcs11 - uses ftreader-pcsc AAR from libs/
apply plugin: 'com.android.library'

android {
    namespace 'com.ftsafe.opensc.pkcs11'
    compileSdk 34
    ndkVersion "28.2.13676358"
    defaultConfig {
        minSdk 21
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
        }
        externalNativeBuild {
            cmake {
                cppFlags "-frtti", "-fexceptions"
                arguments "-DOPENSC_SRC=${projectDir}/opensc"
            }
        }
    }
    externalNativeBuild {
        cmake {
            path file('CMakeLists.txt')
        }
    }
    buildTypes {
        release { minifyEnabled false }
    }
    lint {
        targetSdk 34
    }
    testOptions {
        targetSdk 34
    }
}

dependencies {
    implementation fileTree(dir: project.rootProject.file('libs'), include: ['ftreader-pcsc*.aar'])
}
